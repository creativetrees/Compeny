# ─────────────────────────────────────────────────────────────────────────────
# Creative Trees Group — Local development stack
#   app      PHP 8.5 FPM (Laravel)
#   nginx    web server  → http://localhost:${APP_PORT:-8000}
#   postgres PostgreSQL 17
#   redis    Redis 7 (cache / queue / broadcasting backplane)
#   reverb   Laravel Reverb websocket server (real-time)
#   queue    queue worker
#   vite     asset dev server (HMR)
#   mailpit  mail catcher → http://localhost:${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}
# ─────────────────────────────────────────────────────────────────────────────

# Shared env overrides for containers that run the Laravel app.
# (The host runs artisan against 127.0.0.1:5433; containers use the internal network.)
x-app-environment: &app-environment
  DB_HOST: postgres
  DB_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  MAIL_HOST: mailpit
  MAIL_PORT: "1025"
  REVERB_HOST: reverb

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: creative-trees/app
    container_name: ctg-app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      <<: *app-environment
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [ctg]

  nginx:
    image: nginx:1.27-alpine
    container_name: ctg-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks: [ctg]

  postgres:
    image: postgres:17-alpine
    container_name: ctg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-creative_trees}
      POSTGRES_USER: ${DB_USERNAME:-ctg}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    volumes:
      - ctg-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ctg} -d ${DB_DATABASE:-creative_trees}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [ctg]

  redis:
    image: redis:7-alpine
    container_name: ctg-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - ctg-redisdata:/data
    networks: [ctg]

  reverb:
    image: creative-trees/app
    container_name: ctg-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      <<: *app-environment
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - ./:/var/www/html
    ports:
      - "${REVERB_SERVER_PORT:-8080}:8080"
    depends_on:
      - app
      - redis
    networks: [ctg]

  queue:
    image: creative-trees/app
    container_name: ctg-queue
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      <<: *app-environment
    command: php artisan queue:work --tries=3 --timeout=90 --sleep=1
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - redis
      - postgres
    networks: [ctg]

  vite:
    image: node:26-alpine
    container_name: ctg-vite
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./:/var/www/html
    networks: [ctg]

  mailpit:
    image: axllent/mailpit:latest
    container_name: ctg-mailpit
    restart: unless-stopped
    ports:
      - "${FORWARD_MAILPIT_PORT:-1025}:1025"
      - "${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025"
    networks: [ctg]

networks:
  ctg:
    driver: bridge

volumes:
  ctg-pgdata:
    driver: local
  ctg-redisdata:
    driver: local
