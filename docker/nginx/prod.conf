# ─────────────────────────────────────────────────────────────────────────────
# Hardened production nginx for Creative Trees (TLS, headers, rate limits, gzip).
# Mounted read-only into the nginx container by compose.prod.yaml.
# Replace server_name + cert paths for your domain.
# ─────────────────────────────────────────────────────────────────────────────

# Rate-limit zones (http context).
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=lead:10m  rate=20r/m;

server { # HTTP -> HTTPS redirect + ACME challenge
    listen 80;
    listen [::]:80;
    server_name creativetrees.group www.creativetrees.group;
    location ^~ /.well-known/acme-challenge/ { root /var/www/html/public; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name creativetrees.group www.creativetrees.group;

    root /var/www/html/public;
    index index.php;
    charset utf-8;

    server_tokens off;
    client_max_body_size 12M; # marketing/lead site; 50M was excessive

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers (re-declared in child locations that use add_header — nginx
    # drops inherited headers as soon as a block adds its own).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always; # deprecated -> explicitly disable
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss image/svg+xml font/woff2;

    location = /up { access_log off; try_files $uri /index.php?$query_string; }
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / { try_files $uri $uri/ /index.php?$query_string; }

    # Throttle admin login + lead submission.
    location = /admin/login { limit_req zone=login burst=3 nodelay; try_files $uri /index.php?$query_string; }
    location = /start       { limit_req zone=lead  burst=10 nodelay; try_files $uri /index.php?$query_string; }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp|avif|woff2?|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000" always;
        add_header X-Content-Type-Options "nosniff" always; # re-added: parent dropped
        try_files $uri =404;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTPS on;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        fastcgi_read_timeout 60;
    }

    # WSS proxy for Reverb — enable ONLY when realtime is on.
    # location /app {
    #     proxy_pass http://reverb:8080;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "Upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 60s;
    # }

    location ~ /\.(?!well-known).* { deny all; }

    error_log  /var/log/nginx/creative-trees.error.log warn;
    access_log /var/log/nginx/creative-trees.access.log;
}
