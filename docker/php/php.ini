; Creative Trees Group — PHP runtime tuning (dev)
memory_limit = 512M
upload_max_filesize = 50M
post_max_size = 50M
max_execution_time = 120
max_input_time = 120

; OPcache (safe dev defaults; production overrides in deployment guide)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; Errors visible in dev containers
display_errors = On
error_reporting = E_ALL

date.timezone = UTC
