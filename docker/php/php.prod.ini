; Production PHP overrides for Creative Trees.
; Copy into the runtime image's conf.d (NOT the dev php.ini).

memory_limit = 256M
upload_max_filesize = 12M
post_max_size = 12M
max_execution_time = 60

expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

date.timezone = UTC

; Reduce RCE blast radius — disable functions the app never needs.
disable_functions = exec,passthru,shell_exec,system,proc_open,popen

; OPcache — production
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0      ; requires a php-fpm reload on each deploy
opcache.save_comments = 1            ; Filament/attributes need docblocks
opcache.jit = tracing
opcache.jit_buffer_size = 64M

realpath_cache_size = 4096K
realpath_cache_ttl = 600
