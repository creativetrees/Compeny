# Cache Redis — eviction allowed, persistence off (data is rebuildable).
# Only needed if you split CACHE_STORE=redis away from the queue/session instance.
requirepass ${REDIS_PASSWORD}
protected-mode yes
bind 0.0.0.0
maxmemory 192mb
maxmemory-policy allkeys-lru         # evicting cache keys is fine
appendonly no
save ""                              # no snapshots for a pure cache
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command CONFIG   ""
rename-command KEYS     ""
rename-command DEBUG    ""
