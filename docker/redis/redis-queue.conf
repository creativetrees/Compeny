# Queue / session / broadcast Redis — durable, never evict.
# Used by compose.prod.yaml. ${REDIS_PASSWORD} is substituted at container start
# (the image entrypoint or an envsubst wrapper) — or replace with a literal.
requirepass ${REDIS_PASSWORD}
protected-mode yes
bind 0.0.0.0
maxmemory 192mb
maxmemory-policy noeviction          # never silently drop jobs/sessions
appendonly yes
appendfsync everysec
save 900 1
save 300 10
# Neuter destructive/scanning commands a leaked connection could abuse.
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command CONFIG   ""
rename-command KEYS     ""
rename-command DEBUG    ""
